name: Build and publish Docker image

# Builds the production image from the Dockerfile and pushes it to GHCR so the
# Portainer stack on dev2.camt.cmu.ac.th can pull it. Runs on every push to main
# and can be triggered manually. After it succeeds, in Portainer: update the
# stack with "Pull latest image version" to roll out the new build.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/daydeda/smocamt-website

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Auto-deploy: tell Portainer to re-pull the new image and redeploy the
      # stack. Runs only once PORTAINER_WEBHOOK_URL is set as a repo secret (until
      # then this step no-ops, so the build never fails for a missing webhook).
      # Get the URL from the stack: Portainer → stack → Webhooks (GitOps updates).
      - name: Trigger Portainer redeploy
        env:
          WEBHOOK: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "PORTAINER_WEBHOOK_URL secret not set — skipping auto-redeploy."
            exit 0
          fi
          echo "Triggering Portainer redeploy…"
          curl -fsS -X POST "$WEBHOOK"
