name: Build and publish Docker image

# Builds an image from this repo's Dockerfile and pushes it to GHCR under this
# repo's OWN tag. This repo (songsue) is a downstream dev fork of
# daydeda/smocamt-website (see `upstream` remote) — it must never publish to
# ghcr.io/daydeda/smocamt-website, since that tag is what the REAL production
# Portainer stack (dev2.camt.cmu.ac.th) pulls from. This workflow previously
# pushed to that same tag, which meant any push to this repo's main could
# silently overwrite the real production image with unreleased/stale code.
# Runs on every push to main and can be triggered manually.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/daydeda/songsue

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # No Portainer auto-deploy step here on purpose: this repo doesn't own the
      # production stack, so its CI must never be able to trigger a redeploy of
      # it. If a standalone songsue deployment is needed later, wire a redeploy
      # step to that deployment's own webhook — not the smocamt-website one.
