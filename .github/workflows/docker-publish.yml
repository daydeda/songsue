name: Build and publish Docker image

# Builds an image from this repo's Dockerfile and pushes it to GHCR under this
# repo's OWN tag. This repo (songsue) is a downstream dev fork of
# daydeda/smocamt-website (see `upstream` remote) — it must never publish to
# ghcr.io/daydeda/smocamt-website, since that tag is what the REAL production
# Portainer stack (dev2.camt.cmu.ac.th) pulls from. This workflow previously
# pushed to that same tag, which meant any push to this repo's main could
# silently overwrite the real production image with unreleased/stale code.
# Runs on every push to main and can be triggered manually.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/daydeda/songsue

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Auto-deploy: tell songsue's OWN Portainer stack to re-pull and redeploy.
      # Deliberately a DIFFERENT secret name/value than smocamt-website's
      # PORTAINER_WEBHOOK_URL (that one points at the real activecamt
      # production stack) — this repo's CI must never be able to trigger a
      # redeploy of that stack. Runs only once SONGSUE_PORTAINER_WEBHOOK_URL is
      # set as a repo secret (until then this step no-ops, so the build never
      # fails for a missing webhook). Get the URL from: Portainer → Stacks →
      # songsue → Editor → GitOps updates → enable "Webhook" → copy link.
      #
      # Caveat (see docs/songsue-deploy.md "Updating later"): on this dev2
      # instance, the GitOps panel's "Re-pull image"/"Force redeployment"
      # toggles are greyed out behind a Portainer Business Edition badge. It's
      # unconfirmed whether hitting this webhook alone actually forces a fresh
      # pull of the `:latest` tag vs. silently redeploying stale cached image —
      # verify after the first real push (check the web container's start time
      # in Portainer) before trusting this over the documented manual fallback.
      - name: Trigger Portainer redeploy
        env:
          WEBHOOK: ${{ secrets.SONGSUE_PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "SONGSUE_PORTAINER_WEBHOOK_URL secret not set — skipping auto-redeploy."
            exit 0
          fi
          echo "Triggering Portainer redeploy…"
          curl -fsS -X POST "$WEBHOOK"
