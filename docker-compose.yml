version: '3.8'

services:
  # Next.js Web App Service
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: activecamt-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-activeuser}:${POSTGRES_PASSWORD:-activepass}@db:5432/${POSTGRES_DB:-activedb}?sslmode=disable
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Bind local uploads folder to host to persist student posters/avatars
      - ./public/uploads:/app/public/uploads

  # Postgres Database Service
  db:
    image: postgres:16-alpine
    container_name: activecamt-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-activeuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-activepass}
      POSTGRES_DB: ${POSTGRES_DB:-activedb}
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-activeuser} -d ${POSTGRES_DB:-activedb}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg-data:
    driver: local
