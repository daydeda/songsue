# =============================================================================
# Songsue — Portainer stack for dev2.camt.cmu.ac.th (deployed via docker compose)
#
# SEPARATE from activecamt's production stack (a different repo,
# daydeda/smocamt-website, pulling ghcr.io/daydeda/smocamt-website — not
# managed from here and must never be touched by this deploy). This file
# deploys its own independent stack: own image (ghcr.io/daydeda/songsue), own
# Postgres, own volumes, own domain/port. The two stacks share nothing but the
# physical dev2 Swarm host.
#
# AUTO-DEPLOY (GitOps): deploy this through Portainer's "Repository" build
# method pointing at this file on this repo's main. On every merge to main,
# GitHub Actions builds + pushes the image; wiring a Portainer webhook to
# auto-redeploy is optional and separate from activecamt's — see
# docs/songsue-deploy.md.
#
# DEPLOY (Repository method):
#   - Repository URL: https://github.com/daydeda/songsue
#     Authentication OFF — the repo is public, no GitHub credential needed.
#   - Reference: refs/heads/main   ·   Compose path: docker-stack.songsue.yml
#   - Define the env vars below in the stack's "Environment variables" section
#     (NOT in this file — secrets must never be committed to git):
#       POSTGRES_PASSWORD, AUTH_SECRET, AUTH_GOOGLE_ID, AUTH_GOOGLE_SECRET
#       (GDRIVE_* optional — see docs/songsue-deploy.md)
#
# NOTES:
#   - Port 10781 (below) is hardcoded (a literal, not a var — same pattern
#     activecamt's own stack file uses). CAMT IT confirmed the allowed range
#     for this project is 10700-10799; 10780 is already taken by activecamt,
#     so this uses 10781 — the next free one. If that's already claimed by
#     some other CAMT project, pick another free port in range and change the
#     line below (see docs/songsue-deploy.md "Port + hostname").
#   - Hostname (songsue.camt.cmu.ac.th → 10781) still needs CAMT IT to wire
#     the reverse-proxy route — that's the one step only they can do.
#   - AUTH_GOOGLE_ID / AUTH_GOOGLE_SECRET can be the SAME values as
#     activecamt's stack (reusing one Google OAuth client across both apps is
#     safe — see docs/songsue-deploy.md "OAuth"). Just add songsue's own
#     redirect URI to that same Google Cloud OAuth client; no new client
#     required.
#   - POSTGRES_PASSWORD must be URL-safe (A–Z a–z 0–9 . _ -).
#   - SUPABASE_* are intentionally OMITTED → uploads fall back to local disk
#     (the named volumes below). Do NOT add them.
# =============================================================================
version: '3.8'

services:
  web:
    image: ghcr.io/daydeda/songsue:latest
    ports:
      # CAMT-assigned public port (range 10700-10799; 10780 is activecamt's,
      # this is the next free one) → Next.js inside the container (3000).
      # The CAMT reverse proxy routes https://songsue.camt.cmu.ac.th here.
      - "10781:3000"
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgres://songsueuser:${POSTGRES_PASSWORD}@db:5432/songsuedb?sslmode=disable"
      DB_POOL_MAX: "15"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      ERROR_WEBHOOK_URL: "${ERROR_WEBHOOK_URL:-}"
      AUTH_SECRET: "${AUTH_SECRET}"
      # NextAuth v5 — must be the public URL + /api/auth, and match the Google
      # OAuth redirect URI (https://songsue.camt.cmu.ac.th/api/auth/callback/google)
      # added to the SAME Google Cloud OAuth client activecamt uses.
      AUTH_URL: "https://songsue.camt.cmu.ac.th/api/auth"
      AUTH_GOOGLE_ID: "${AUTH_GOOGLE_ID}"
      AUTH_GOOGLE_SECRET: "${AUTH_GOOGLE_SECRET}"
    volumes:
      - songsue-uploads:/app/public/uploads
      - songsue-uploads-private:/app/.uploads-private
    depends_on:
      db:
        condition: service_healthy

  # Optional — see docs/songsue-deploy.md "Backups". Omit the `backup` service
  # entirely from the deployed stack if you don't want it yet; the env vars
  # below just won't resolve to anything if you never set them, but Portainer
  # will still try to start the service, so leave it commented until ready.
  # backup:
  #   image: ghcr.io/daydeda/songsue:latest
  #   restart: unless-stopped
  #   environment:
  #     DATABASE_URL: "postgres://songsueuser:${POSTGRES_PASSWORD}@db:5432/songsuedb?sslmode=disable"
  #     GDRIVE_OAUTH_CLIENT_ID: "${GDRIVE_OAUTH_CLIENT_ID}"
  #     GDRIVE_OAUTH_CLIENT_SECRET: "${GDRIVE_OAUTH_CLIENT_SECRET}"
  #     GDRIVE_OAUTH_REFRESH_TOKEN: "${GDRIVE_OAUTH_REFRESH_TOKEN}"
  #     GDRIVE_FOLDER_ID: "${GDRIVE_FOLDER_ID}"
  #     BACKUP_RETENTION_DAYS: "${BACKUP_RETENTION_DAYS:-30}"
  #   entrypoint: ["sh", "-c"]
  #   command: ["while true; do node scripts/backup-db.mjs; sleep 86400; done"]
  #   depends_on:
  #     db:
  #       condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: songsueuser
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: songsuedb
    volumes:
      - songsue-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U songsueuser -d songsuedb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  songsue-uploads:
  songsue-uploads-private:
  songsue-pg-data:
