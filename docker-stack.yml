# =============================================================================
# ActiveCAMT — Portainer stack for dev2.camt.cmu.ac.th (deployed via docker compose)
#
# AUTO-DEPLOY (GitOps): deploy this through Portainer's "Repository" build method
# pointing at this file on main. On every merge to main, GitHub Actions builds +
# pushes the image and then calls the Portainer stack webhook, which re-pulls the
# image and redeploys. See docs/supabase-to-university-server-cutover.md.
#
# DEPLOY (Repository method):
#   - Repository URL: https://github.com/daydeda/smocamt-website
#     Authentication ON → GitHub username + a PAT (repo is private).
#   - Reference: refs/heads/main   ·   Compose path: docker-stack.yml
#   - Enable "GitOps updates" → Webhook, and "Re-pull image".
#   - Define the env vars below in the stack's "Environment variables" section
#     (NOT in this file — secrets must never be committed to git):
#       POSTGRES_PASSWORD, AUTH_SECRET, AUTH_GOOGLE_ID, AUTH_GOOGLE_SECRET
#
# NOTES:
#   - The image must be pullable: make the GHCR package public, or add a ghcr.io
#     registry credential in Portainer (username + PAT with read:packages).
#   - POSTGRES_PASSWORD must be URL-safe (A–Z a–z 0–9 . _ -); special chars like
#     @ : / break DATABASE_URL and would need percent-encoding.
#   - SUPABASE_* are intentionally OMITTED → uploads fall back to local disk
#     (the named volumes below). Do NOT add them.
# =============================================================================
version: '3.8'

services:
  web:
    image: ghcr.io/daydeda/smocamt-website:latest
    ports:
      # CAMT-assigned public port 10780 → Next.js inside the container (3000).
      # The CAMT reverse proxy routes https://activecamt.camt.cmu.ac.th here.
      - "10780:3000"
    restart: unless-stopped
    environment:
      # Points at the `db` service below over the stack's internal network.
      DATABASE_URL: "postgres://activecamtuser:${POSTGRES_PASSWORD}@db:5432/activecamtdb?sslmode=disable"
      # Per-instance Postgres connection pool size. We own this DB (not the Supabase
      # pooler), so 15 is safe — well under Postgres's default max_connections of 100.
      # Raise toward 20 only if event scan-ins still queue; the code default is 15.
      DB_POOL_MAX: "15"
      # Observability (src/lib/logger.ts). LOG_LEVEL: debug|info|warn|error (default
      # info). ERROR_WEBHOOK_URL is OPTIONAL — a Discord/Slack incoming webhook (or any
      # JSON endpoint / self-hosted GlitchTip) that receives redacted alerts on
      # unhandled errors. Unset (the `:-` default below → empty) = structured logs only.
      #
      # IMPORTANT: like AUTH_SECRET etc., these must be MAPPED here to reach the
      # container — defining a Portainer stack variable alone does nothing unless the
      # compose file interpolates it. Set the value in the stack's Environment
      # variables; this line injects it.
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      ERROR_WEBHOOK_URL: "${ERROR_WEBHOOK_URL:-}"
      AUTH_SECRET: "${AUTH_SECRET}"
      # NextAuth v5 — must be the public URL + /api/auth, and match the Google
      # OAuth redirect URI (https://activecamt.camt.cmu.ac.th/api/auth/callback/google).
      AUTH_URL: "https://activecamt.camt.cmu.ac.th/api/auth"
      AUTH_GOOGLE_ID: "${AUTH_GOOGLE_ID}"
      AUTH_GOOGLE_SECRET: "${AUTH_GOOGLE_SECRET}"
    volumes:
      - uploads:/app/public/uploads          # public posters/avatars/QR
      - uploads-private:/app/.uploads-private # PDPA: form docs + payment slips
    # This Portainer environment deploys with `docker compose`, so depends_on +
    # the db healthcheck below hold web back until Postgres is ready.
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: activecamtuser
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}" # MUST equal the one in DATABASE_URL
      POSTGRES_DB: activecamtdb
    volumes:
      - pg-data:/var/lib/postgresql/data
    # No published ports — the DB is reachable only by `web` over the stack's
    # internal network, never exposed on the node / to the LAN.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U activecamtuser -d activecamtdb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  uploads:
  uploads-private:
  pg-data:
