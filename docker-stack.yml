# =============================================================================
# ActiveCAMT — Docker Swarm / Portainer stack for dev2.camt.cmu.ac.th
#
# Deploy: Portainer → Primary → Stacks → + Add Stack → paste this YAML → fill
# every CHANGEME → Deploy the stack. (docker-compose.yml is for LOCAL dev only;
# this file is production, because Portainer's editor can't `build:` and the
# shared swarm gives you no host paths — so: pre-built image + named volumes.)
#
# BEFORE DEPLOYING:
#   1. The image must be published to GHCR (push to main → GitHub Actions builds
#      it). If the GHCR package is PRIVATE, add a registry in Portainer
#      (Registries → Add → Custom, ghcr.io, your GitHub username + a PAT with
#      read:packages) OR make the package public.
#   2. Replace every CHANGEME below. These values live in the Portainer stack
#      definition (there is no .env file on the swarm).
#   3. POSTGRES_PASSWORD must match the password in DATABASE_URL. Use only
#      URL-safe characters (A–Z a–z 0–9 . _ -); special chars like @ : / break
#      the DATABASE_URL and must be percent-encoded if you use them.
#   4. SUPABASE_* are intentionally OMITTED → uploads fall back to local disk
#      (the named volumes below). Do NOT add them here.
# =============================================================================
version: '3.8'

services:
  web:
    image: ghcr.io/daydeda/smocamt-website:latest
    ports:
      # CAMT-assigned public port 10780 → Next.js inside the container (3000).
      # The CAMT reverse proxy routes https://camtplaybase.camt.cmu.ac.th here.
      - "10780:3000"
    environment:
      # Points at the `db` service below over the stack's internal overlay network.
      DATABASE_URL: "postgres://activeuser:CHANGEME_DB_PASSWORD@db:5432/activedb?sslmode=disable"
      # `openssl rand -base64 33`
      AUTH_SECRET: "CHANGEME_AUTH_SECRET"
      # NextAuth v5 — must be the public URL + /api/auth, and match the Google
      # OAuth redirect URI (https://camtplaybase.camt.cmu.ac.th/api/auth/callback/google).
      AUTH_URL: "https://camtplaybase.camt.cmu.ac.th/api/auth"
      AUTH_GOOGLE_ID: "CHANGEME_GOOGLE_CLIENT_ID"
      AUTH_GOOGLE_SECRET: "CHANGEME_GOOGLE_CLIENT_SECRET"
    volumes:
      - uploads:/app/public/uploads          # public posters/avatars/QR
      - uploads-private:/app/.uploads-private # PDPA: form docs + payment slips
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
    # NOTE: Swarm IGNORES depends_on. If web starts before db it crashes and the
    # restart_policy brings it back until db accepts connections — expected.

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: activeuser
      POSTGRES_PASSWORD: "CHANGEME_DB_PASSWORD" # MUST equal the one in DATABASE_URL
      POSTGRES_DB: activedb
    volumes:
      - pg-data:/var/lib/postgresql/data
    # No published ports — the DB is reachable only by `web` over the internal
    # overlay network, never exposed on the node / to the LAN.
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U activeuser -d activedb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  uploads:
  uploads-private:
  pg-data:
