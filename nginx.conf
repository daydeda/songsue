# Standard HTTP Server Block (Redirect to HTTPS)
server {
    listen 80;
    listen [::]:80;
    server_name activecamt.university.ac.th; # Change to your actual domain name

    # Let's Encrypt SSL Validation Path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Standard HTTPS Server Block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name activecamt.university.ac.th; # Change to your actual domain name

    # SSL Certificates (Managed by Let's Encrypt Certbot)
    ssl_certificate /etc/letsencrypt/live/activecamt.university.ac.th/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/activecamt.university.ac.th/privkey.pem;

    # SSL Security Optimization Options
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Increase upload payload limit (vital for student activity poster uploads)
    client_max_body_size 10M;

    # Gzip Compression
    gzip on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Uploaded media (posters, avatars, QR). Each upload gets a unique randomUUID
    # filename and is never overwritten (src/app/api/upload/route.ts), so an existing
    # URL's content never changes — safe to cache hard. Next serves /uploads with no
    # useful Cache-Control, so we replace it here: browsers stop re-fetching the same
    # image on every page load, cutting load on the app container.
    location /uploads/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    # Dynamic Proxy to Next.js
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        
        # Headers essential for NextAuth and our client IP Rate Limiter
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
    }
}
